name: SDK — Tests & Publish

on:
  push:
    branches: [main, master]
    paths:
      - 'sdk/**'
  pull_request:
    paths:
      - 'sdk/**'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publier sur GitHub Packages (true/false)'
        default: 'false'

jobs:
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage --ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: sdk-coverage
          path: sdk/coverage/

  build:
    name: Build dist/
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: sdk/dist/

  publish:
    name: Publish @tafdil/sdk → GitHub Packages
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (github.event_name == 'push' || github.event.inputs.publish == 'true')
    defaults:
      run:
        working-directory: sdk

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@tafdil'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: sdk/dist/

      - run: npm ci

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
